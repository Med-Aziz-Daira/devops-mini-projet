<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager — DevOps Project</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
    header { background: #1a1a2e; color: white; padding: 20px 40px; }
    header h1 { font-size: 1.5rem; }
    header p { font-size: 0.85rem; opacity: 0.7; margin-top: 4px; }
    .container { max-width: 600px; margin: 40px auto; padding: 0 20px; }
    .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
    .input-row { display: flex; gap: 10px; }
    input[type="text"] { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
    button { padding: 10px 20px; background: #1a1a2e; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #16213e; }
    .task-list { list-style: none; margin-top: 16px; }
    .task-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
    .task-item:last-child { border-bottom: none; }
    .delete-btn { background: #e74c3c; padding: 6px 12px; font-size: 0.8rem; border-radius: 6px; }
    .status { font-size: 0.8rem; padding: 4px 10px; border-radius: 20px; background: #e8f5e9; color: #2e7d32; }
    #error { color: #e74c3c; font-size: 0.9rem; margin-top: 8px; }
  </style>
</head>
<body>
  <header>
    <h1>📋 Task Manager</h1>
    <p>Mini Projet DevOps — Pipeline CI/CD complet</p>
  </header>
  <div class="container">
    <div class="card">
      <h2 style="margin-bottom:16px;">Ajouter une tâche</h2>
      <div class="input-row">
        <input type="text" id="taskInput" placeholder="Nouvelle tâche..." />
        <button onclick="addTask()">Ajouter</button>
      </div>
      <p id="error"></p>
    </div>
    <div class="card">
      <h2 style="margin-bottom:16px;">Mes tâches</h2>
      <ul class="task-list" id="taskList">
        <li style="color:#999;">Chargement...</li>
      </ul>
    </div>
  </div>

  <script>
    const API = window.location.hostname === 'localhost'
      ? 'http://localhost:3000'
      : `http://${window.location.hostname}:3000`;

    async function loadTasks() {
      try {
        const res = await fetch(`${API}/tasks`);
        const tasks = await res.json();
        const list = document.getElementById('taskList');
        if (tasks.length === 0) {
          list.innerHTML = '<li style="color:#999;">Aucune tâche pour le moment.</li>';
          return;
        }
        list.innerHTML = tasks.map(t => `
          <li class="task-item">
            <span>${t.title}</span>
            <div style="display:flex;gap:8px;align-items:center;">
              <span class="status">En cours</span>
              <button class="delete-btn" onclick="deleteTask(${t.id})">Supprimer</button>
            </div>
          </li>
        `).join('');
      } catch (e) {
        document.getElementById('taskList').innerHTML = '<li style="color:#e74c3c;">Erreur de connexion à l\'API</li>';
      }
    }

    async function addTask() {
      const input = document.getElementById('taskInput');
      const error = document.getElementById('error');
      const title = input.value.trim();
      if (!title) { error.textContent = 'Le titre est requis.'; return; }
      error.textContent = '';
      await fetch(`${API}/tasks`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title })
      });
      input.value = '';
      loadTasks();
    }

    async function deleteTask(id) {
      await fetch(`${API}/tasks/${id}`, { method: 'DELETE' });
      loadTasks();
    }

    loadTasks();
  </script>
</body>
</html>
